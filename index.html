<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热 AI 实验室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-body:      #F8F3EA;
    --bg-card:      #FFFBF5;
    --text-primary: #2D2418;
    --text-secondary:#5C4F3D;
    --text-muted:   #8C7E6C;
    --heading-color:#1B2A4A;
    --accent:       #B33A3A;
    --gold:         #B8943D;
    --border:       rgba(44, 62, 107, 0.12);
    --shadow-soft:  0 2px 20px rgba(45, 36, 24, 0.06);
    --font-heading: 'Noto Serif SC', 'Songti SC', serif;
    --font-body:    'Noto Sans SC', 'PingFang SC', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg-body);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 72px 28px 80px; }
  .brand { text-align: center; margin-bottom: 48px; }
  .brand-seal {
    width: 56px; height: 56px; margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--accent); border-radius: 4px;
    color: var(--accent); font-family: var(--font-heading);
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    writing-mode: vertical-rl;
  }
  .brand-name {
    font-family: var(--font-heading); font-size: 32px; font-weight: 900;
    color: var(--heading-color); letter-spacing: 6px; margin-bottom: 8px;
  }
  .brand-sub {
    font-size: 13px; color: var(--text-muted); letter-spacing: 2px;
  }
  .hero {
    text-align: center; margin-bottom: 64px;
  }
  .hero p {
    font-size: 15px; color: var(--text-secondary); line-height: 2;
    max-width: 560px; margin: 0 auto;
  }
  .section-title {
    font-family: var(--font-heading); font-size: 18px; font-weight: 700;
    color: var(--heading-color); letter-spacing: 4px; margin-bottom: 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .section-title::before, .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .post-list { margin-bottom: 64px; }
  .post-card {
    display: block; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 2px; padding: 28px; margin-bottom: 16px; text-decoration: none;
    box-shadow: var(--shadow-soft);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
  }
  .post-card:hover {
    transform: translateY(-2px); box-shadow: 0 8px 32px rgba(45, 36, 24, 0.1);
    border-color: rgba(44, 62, 107, 0.2);
  }
  .post-card h3 {
    font-family: var(--font-heading); font-size: 18px; font-weight: 700;
    color: var(--heading-color); margin-bottom: 6px; letter-spacing: 1px;
  }
  .post-card .meta {
    font-size: 12px; color: var(--text-muted); letter-spacing: 1px;
  }
  .post-card .desc {
    font-size: 13.5px; color: var(--text-secondary); margin-top: 10px; line-height: 1.8;
  }
  .qr-section { margin-bottom: 64px; text-align: center; }
  .qr-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; margin-top: 32px;
  }
  .qr-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px;
    padding: 28px; box-shadow: var(--shadow-soft);
  }
  .qr-card .label {
    font-family: var(--font-heading); font-size: 16px; font-weight: 600;
    color: var(--heading-color); margin-bottom: 4px; letter-spacing: 2px;
  }
  .qr-card .desc {
    font-size: 12px; color: var(--text-muted); margin-bottom: 20px; letter-spacing: 1px;
  }
  .qr-card img {
    width: 148px; height: 148px; object-fit: contain; border: 1px solid var(--border);
    padding: 6px; background: #fff;
  }
  .footer {
    text-align: center; padding-top: 36px;
    border-top: 1px solid var(--border);
  }
  .footer p {
    font-family: var(--font-heading); font-size: 12px; color: var(--text-muted);
    line-height: 2.2; letter-spacing: 1px;
  }
  @media (max-width: 640px) {
    .brand-name { font-size: 26px; letter-spacing: 4px; }
    .qr-grid { grid-template-columns: 1fr; }
    .container { padding: 48px 20px 60px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="brand">
      <div class="brand-seal">热 AI</div>
      <h1 class="brand-name">热 AI 实验室</h1>
      <p class="brand-sub">Hot AI Lab · 探索、分享、连接</p>
    </header>

    <section class="hero">
      <p>这里是热 AI 实验室的内容总集。我们记录人工智能领域的前沿观察、大会见闻与深度思考，把零散的灵感整理成可复用的知识片段。</p>
    </section>

    <section class="post-list">
      <h2 class="section-title">最新分享</h2>
      <a class="post-card" href="WAIC2026-十大镇馆之宝.html">
        <h3>WAIC 2026 · 十大镇馆之宝</h3>
        <div class="meta">2026-07-17 · 大会见闻</div>
        <p class="desc">从上海世界人工智能大会探馆视频中整理的十大亮点展品，覆盖大模型、机器人、智能终端与能源等方向。</p>
      </a>
    </section>

    <section class="qr-section">
      <h2 class="section-title">加入社区</h2>
      <div class="qr-grid">
        <div class="qr-card">
          <div class="label">实验室社区</div>
          <div class="desc">扫码加入群聊</div>
          <img src="qr-community.png" alt="热 AI 实验室社区群二维码">
        </div>
        <div class="qr-card">
          <div class="label">联系运营</div>
          <div class="desc">扫码添加微信</div>
          <img src="qr-contact.png" alt="运营负责人微信二维码">
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>热 AI 实验室 · 2026<br>由 EdgeOne Pages 驱动部署</p>
    </footer>
  </div>
</body>
</html>
